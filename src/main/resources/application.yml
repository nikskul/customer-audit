server:
  port: ${$APPLICATION_PORT}

spring:
  application:
    name: customer_audit
  jpa:
    open-in-view: off
  datasource:
    url: "env:DATABASE_URL"
    username: "env:DATABASE_USERNAME"
    password: "env:DATABASE_PASSWORD"
    driver-class-name: org.postgresql.Driver

phone:
  pattern: '\\+7[0-9]{10}'